# LUMINA OS - Production Docker Compose Configuration
# Domain: lumina.devproflow.com
# Infrastructure: Cloudflare + Nginx + Docker
version: '3.8'

services:
  # Supabase External Database (REMOVED LOCAL POSTGRES)
  # Note: Using Supabase cloud PostgreSQL instead
  
  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: lumina_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - lumina_network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Expose only to internal network
    expose:
      - "6379"

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    container_name: lumina_backend
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql://lumina_user:${DATABASE_PASSWORD}@postgres:5432/lumina_production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - FRONTEND_URL=https://lumina.devproflow.com
      - API_URL=https://lumina.devproflow.com/api
      - CORS_ORIGINS=["https://lumina.devproflow.com"]
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./backups:/app/backups
    networks:
      - lumina_network
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Expose only to internal network (not to host)
    expose:
      - "8000"
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Next.js Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    container_name: lumina_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://lumina.devproflow.com/api
      - NEXT_PUBLIC_FRONTEND_URL=https://lumina.devproflow.com
      - NEXT_PUBLIC_ENVIRONMENT=production
    volumes:
      - ./logs:/app/logs
      - ./public/uploads:/app/public/uploads
    networks:
      - lumina_network
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Expose only to internal network (not to host)
    expose:
      - "3000"
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Nginx Reverse Proxy (Public Facing)
  nginx:
    image: nginx:alpine
    container_name: lumina_nginx
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/ssl/certs
      - ./logs/nginx:/var/log/nginx
      - ./public/maintenance:/var/www/maintenance
    networks:
      - lumina_network
    restart: always
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Celery Worker (Background Tasks)
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    container_name: lumina_celery_worker
    command: celery -A core_modules.celery_app worker --loglevel=info --concurrency=4
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql://lumina_user:${DATABASE_PASSWORD}@postgres:5432/lumina_production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./backups:/app/backups
    networks:
      - lumina_network
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Celery Beat (Scheduled Tasks)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    container_name: lumina_celery_beat
    command: celery -A core_modules.celery_app beat --loglevel=info
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgresql://lumina_user:${DATABASE_PASSWORD}@postgres:5432/lumina_production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./backups:/app/backups
    networks:
      - lumina_network
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Flower (Celery Monitoring)
  flower:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: production
    container_name: lumina_flower
    command: celery -A core_modules.celery_app flower --port=5555 --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://lumina_user:${DATABASE_PASSWORD}@postgres:5432/lumina_production
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - lumina_network
    restart: always
    depends_on:
      - redis
      - celery_worker
    # Expose only to internal network
    expose:
      - "5555"
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

# Network Configuration
networks:
  lumina_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volume Configuration
volumes:
  # postgres_data: REMOVED (using Supabase)
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  app_logs:
    driver: local

# Production Overrides
# Use: docker-compose -f docker-compose.yml -f docker-compose.production.yml up -d
