# LUMINA OVERMIND SYSTEM - Pytest Configuration
# ==============================================
# Comprehensive testing configuration for backend API

[tool:pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=api
    --cov=core_modules
    --cov=tasks
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=80
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests - fast, isolated tests
    integration: Integration tests - database and external service tests
    e2e: End-to-end tests - full workflow tests
    slow: Slow running tests (>1 second)
    auth: Authentication and authorization tests
    api: API endpoint tests
    celery: Celery task tests
    database: Database operation tests
    security: Security vulnerability tests
    performance: Performance benchmark tests

# Minimum version
minversion = 6.0

# Test session configuration
console_output_style = progress
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:celery.*
    ignore::UserWarning:prisma.*

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Async test configuration
asyncio_mode = auto

# Fixture configuration
usefixtures = 
    test_db
    test_client
    celery_worker
