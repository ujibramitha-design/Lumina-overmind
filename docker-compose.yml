services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lumina_postgres
    environment:
      POSTGRES_DB: lumina_os
      POSTGRES_USER: lumina_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lumina_secure_password_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    # Remove external port exposure for security
    # ports:
    #   - "5432:5432"
    networks:
      - lumina_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina_user -d lumina_os"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    container_name: lumina_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password_2024}
    volumes:
      - redis_data:/data
    # Remove external port exposure for security
    # ports:
    #   - "6379:6379"
    networks:
      - lumina_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: lumina_fastapi
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://lumina_user:${POSTGRES_PASSWORD:-lumina_secure_password_2024}@postgres:5432/lumina_os
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-lumina_super_secret_key_2024}
      - ENVIRONMENT=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://your-domain.com,https://www.your-domain.com}
      - PUBLIC_URL=${PUBLIC_URL:-https://your-domain.com}
    volumes:
      - ./core_modules:/app/core_modules
      - ./api:/app/api
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    # Remove external port exposure - will be accessed through Nginx
    # ports:
    #   - "8000:8000"
    networks:
      - lumina_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    environment:
      - DATABASE_URL=postgresql://lumina_user:${POSTGRES_PASSWORD:-lumina_secure_password_2024}@postgres:5432/lumina_os
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-lumina_super_secret_key_2024}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./core_modules:/app/core_modules
      - ./tasks:/app/tasks
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
      - ./frontend/pdf_engine:/app/frontend/pdf_engine
    networks:
      - lumina_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 2

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: lumina_celery_beat
    command: celery -A tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://lumina_user:${POSTGRES_PASSWORD:-lumina_secure_password_2024}@postgres:5432/lumina_os
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_secure_password_2024}@redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-lumina_super_secret_key_2024}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./core_modules:/app/core_modules
      - ./tasks:/app/tasks
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - lumina_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Next.js Frontend
  nextjs:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: lumina_nextjs
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_URL:-https://your-domain.com}
      - NEXT_PUBLIC_WS_URL=${WS_URL:-wss://your-domain.com}
      - NODE_ENV=production
      - SECRET_KEY=${SECRET_KEY:-lumina_super_secret_key_2024}
    volumes:
      - ./dashboard:/app
      - /app/node_modules
      - ./frontend:/app/frontend
      - ./core_modules/visual:/app/core_modules/visual
    # Remove external port exposure - will be accessed through Nginx
    # ports:
    #   - "3000:3000"
    networks:
      - lumina_network
    depends_on:
      - fastapi
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lumina_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./static:/var/www/static
      - ./output:/var/www/output
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lumina_network
    depends_on:
      - fastapi
      - nextjs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: lumina_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - lumina_network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: lumina_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - lumina_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  lumina_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
